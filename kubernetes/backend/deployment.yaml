apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudmart-backend
  labels:
    app: cloudmart-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudmart-backend

  template:
    metadata:
      labels:
        app: cloudmart-backend

    spec:
      containers:
        - name: backend
          image: cloudmart-devops-platform-backend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: backend-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD