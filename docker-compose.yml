services:
  mysql:
    image: mysql:8.4
    container_name: cloudmart-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cloudmart

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: cloudmart-backend
    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend

    container_name: cloudmart-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  mysql-data: